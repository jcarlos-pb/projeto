  var mapa = L.map('mapa').setView([-7.2426599, -36.5], 8);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 10,
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(mapa);

  // ── Painel de informações (hover) ─────────────────────────────────────────
  var info = L.control({ position: 'topright' });

  info.onAdd = function () {
    this._div = L.DomUtil.create('div', 'info-municipio');
    this.update();
    return this._div;
  };

  info.update = function (props) {
    if (props) {
      this._div.innerHTML =
        '<h4>📍 ' + props.NM_MUN + '</h4>' +
        '<span>Cód. IBGE: ' + props.CD_MUN + '</span>' +
        '<span>Área: ' + parseFloat(props.AREA_KM2).toFixed(2) + ' km²</span>';
    } else {
      this._div.innerHTML = '<h4>Paraíba</h4><span>Passe o mouse sobre um município</span>';
    }
  };

  info.addTo(mapa);

  // ── Estilos ───────────────────────────────────────────────────────────────
  var estiloPadrao = {
    color: "#333",
    weight: 1,
    fillColor: "#6baed6",
    fillOpacity: 0.6
  };

  var estiloDestaque = {
    color: "#1a5276",
    weight: 2,
    fillColor: "#2980b9",
    fillOpacity: 0.85
  };

  // ── Camada GeoJSON ────────────────────────────────────────────────────────
  var camadaMunicipios;

  function onEachFeature(feature, layer) {
    var p = feature.properties;
    layer.bindPopup(
      '<strong>' + p.NM_MUN + '</strong><br>' +
      'Cód. IBGE: ' + p.CD_MUN + '<br>' +
      'Área: ' + parseFloat(p.AREA_KM2).toFixed(2) + ' km²'
    );

    layer.on({
      mouseover: function (e) {
        e.target.setStyle(estiloDestaque);
        e.target.bringToFront();
        info.update(p);
      },
      mouseout: function (e) {
        camadaMunicipios.resetStyle(e.target);
        info.update();
      },
      click: function (e) {
        mapa.fitBounds(e.target.getBounds());
        layer.openPopup();
      }
    });
  }

  camadaMunicipios = L.geoJSON(dadosMunicipios, {
    style: estiloPadrao,
    onEachFeature: onEachFeature
  }).addTo(mapa);

  mapa.fitBounds(camadaMunicipios.getBounds());
</script>
